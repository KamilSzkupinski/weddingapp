<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=900, initial-scale=1.1, minimum-scale=0.3, maximum-scale=2" />
  <title>Wesele Patrycji &amp; Kamila – Interaktywna mapa stołów</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      /* Nowa oliwkowa paleta barw */
      --bg-olive: #e4eadf; /* Jednolity oliwkowy kolor tła strony */
      --ink: #1a2116;
      --accent: #a3b895;
      --accent-strong: #647d52;
      --highlight: #d1e5b8;
    }
    * { box-sizing: border-box; }
    html, body { height: 135%; overflow-x: auto; }
    body {
      margin: 0;
      background-color: var(--bg-olive); /* Usunięto gradient na rzecz jednolitej oliwki */
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 24px 16px 8px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    header h1 {
      font-family: "Great Vibes", cursive;
      font-size: 40px;
      margin: 0 0 6px;
    }
    header p { margin: 0; opacity: .85; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 14px 16px 8px;
      flex-wrap: wrap;
    }
    .controls input {
      padding: 12px 14px;
      border: 1px solid #c8d1c2;
      border-radius: 10px;
      min-width: 320px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
    }
    .controls button {
      padding: 12px 18px;
      border: 1px solid #c8d1c2;
      border-radius: 10px;
      background: #dde6d7;
      color: var(--ink);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .controls button:hover { background: #cedbc6; }

    .legend {
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      margin: 10px 0 0;
    }
    .legend.hidden {
      display: none;
    }

    /* Układ główny */
    .layout {
      max-width: none;
      margin: 0 auto;
      padding: 20px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
      position: relative;
      z-index: 2;
    }

    /* PRZENIESIONE I ZAKOTWICZONE TŁO: zaczyna się równo z kółkami miejsc siedzących stołu prezydialnego */
    .layout::before {
      content: "";
      position: absolute;
      top: 20px; /* Wyrównanie do górnego paddingu layoutu (dokładnie tam gdzie zaczynają się kółka) */
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      bottom: 370px; /* Zmienione na 370px - kończy się dokładnie na dole najdłuższych stołów (2 i 3) */
      background-image: url('shrekfiona.jpg');
      background-size: contain;
      background-position: top center;
      background-repeat: no-repeat;
      z-index: -1;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      pointer-events: none;
    }

    /* Pokazanie tła po aktywacji wyszukiwania */
    body.show-background .layout::before {
      opacity: 0.40; /* Delikatna przezroczystość dla zachowania czytelności mapy */
    }

    /* Stół Młodych */
    .bride-wrap {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 14px;
      transition: opacity 1s ease-in-out; /* Płynne wejście przezroczystości */
    }
    
    /* Po wyszukaniu stół prezydialny dostaje opacity 0.7 (70% widoczności, 30% prześwitu) */
    body.show-background .bride-wrap {
      opacity: 0.55;
    }

    .bride-rect {
      height: 68px;
      background: rgba(238, 242, 235, 0.9);
      border: 2px solid var(--accent-strong);
      border-radius: 12px;
      display: grid;
      place-items: center;
      transition: box-shadow .25s ease, transform .2s ease;
    }
    .bride-rect.active {
      box-shadow: 0 0 0 3px var(--accent-strong) inset, 0 10px 20px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }
    .bride-rect .label {
      font-weight: 700;
      color: var(--ink);
      font-size: 24px;
    }
    .bride-seats {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 40px;
      gap: 10px;
      align-items: center;
      justify-items: center;
    }

	body.show-background .tables-wrap {
      opacity: 0.85;
    }
	
    /* Sekcja stołów dla gości */
    .tables-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      position: relative;
    }
    .tables {
      display: flex;
      flex-direction: row;
      gap: 50px;
      justify-content: center;
      align-items: flex-start;
    }

    /* Pojedynczy stół */
    .table-block {
      display: grid;
      grid-template-columns: auto 68px auto;
      gap: 12px;
      align-items: stretch;
      justify-items: center;
    }
    .table-rect {
      width: 68px;
      background: rgba(216, 224, 210, 0.9);
      border: 2px solid var(--accent-strong);
      border-radius: 12px;
      display: grid;
      place-items: center;
      position: relative;
      transition: box-shadow .25s ease, transform .2s ease;
    }
    .table-rect.active {
      box-shadow: 0 0 0 3px var(--accent-strong) inset, 0 10px 20px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }
    .table-rect .label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-weight: 700;
      font-size: 22px;
      color: var(--ink);
      padding: 15px 0;
    }

    .seats-col {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .seat {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-strong);
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      color: var(--ink);
      user-select: none;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      flex-shrink: 0;
    }
    .seat:hover { transform: translateY(-2px); }
    .seat.you {
      background: var(--highlight);
      box-shadow: 0 0 0 3px var(--accent-strong) inset, 0 0 18px rgba(100, 125, 82, 0.5);
      font-weight: 700;
    }

    /* Parkiet */
    .floor {
      background: rgba(188, 201, 178, 0.8);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 800px;
      height: 240px; 
      margin-top: 20px;
      border: 2px dashed #99ab8d;
      position: relative;
      z-index: 2;
    }
    .floor span {
      font-family: Georgia, serif;
      font-size: 38px;
      color: var(--ink);
      letter-spacing: .5px;
    }
  
    .layout.hidden { display: none !important; }
    .layout.revealed { animation: fadeIn .35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  </style>
</head>

    const SEATS = {"1":28,"2":37,"3":40,"4":35,"Prezydialny":14};

    const tablesEl = document.getElementById("tables");
    const brideSeats = document.getElementById("brideSeats");
    const brideRect = document.getElementById("brideRect");
    const mainLegend = document.getElementById("mainLegend");

    let successfulSearchCount = 0; // Licznik udanych kliknięć/wyszukiwań

    function createVerticalTable(id) {
      const n = SEATS[id];
      let leftCount = Math.floor(n / 2);
      if (id === "2" || id === "4") {
        leftCount = Math.ceil(n / 2);
      }
      const rightCount = n - leftCount;

      const block = document.createElement("div");
      block.className = "table-block";
      block.dataset.table = id;

      const left = document.createElement("div");
      left.className = "seats-col left";

      for (let i = 0; i < leftCount; i++) {
        const idx = i + 1;
        const s = document.createElement("button");
        s.type = "button";
        s.className = "seat";
        s.dataset.seat = idx;
        s.textContent = idx;
        s.title = `Stół ${id}, miejsce ${idx}`;
        left.appendChild(s);
      }

      const rect = document.createElement("div");
      rect.className = "table-rect";
      rect.innerHTML = `<span class="label">Stół ${id}</span>`;
      
      let rectRows = Math.max(leftCount, rightCount);
      if (id === "2" || id === "3") {
        rectRows = 20; 
      }
      rect.style.height = (rectRows * 36 + (rectRows - 1) * 8 + 16) + 'px';

      const right = document.createElement("div");
      right.className = "seats-col right";

      for (let i = 0; i < rightCount; i++) {
        const idx = leftCount + i + 1;
        const s = document.createElement("button");
        s.type = "button";
        s.className = "seat";
        s.dataset.seat = idx;
        s.textContent = idx;
        s.title = `Stół ${id}, miejsce ${idx}`;
        right.appendChild(s);
      }

      block.appendChild(left);
      block.appendChild(rect);
      block.appendChild(right);

      rect.addEventListener("click", clearHighlights);
      tablesEl.appendChild(block);
    }

    function createBrideTable() {
      const n = SEATS["Prezydialny"];
      brideSeats.innerHTML = "";
      for (let i = 1; i <= n; i++) {
        const s = document.createElement("button");
        s.type = "button";
        s.className = "seat";
        s.dataset.seat = i;
        s.textContent = i;
        s.title = `Stół Prezydialny, miejsce ${i}`;
        brideSeats.appendChild(s);
      }
    }

    function fitBrideWidthToSeats() {
      const n = SEATS["Prezydialny"];
      if (!n) return;
      const seatW = 36;
      const gap = 10;
      const padding = 40;
      const total = n * seatW + (n - 1) * gap + padding;
      brideRect.style.width = total + 'px';
    }

    ["4", "3", "2", "1"].forEach(createVerticalTable);
    createBrideTable();

    window.requestAnimationFrame(fitBrideWidthToSeats);
    window.addEventListener('resize', fitBrideWidthToSeats);

    function normalizePl(txt) {
      return (txt || "").toString().toLowerCase()
        .normalize('NFD')
        .replace(/\p{Diacritic}/gu, '')
        .trim();
    }

    function clearHighlights() {
      document.querySelectorAll(".seat.you").forEach(el => el.classList.remove("you"));
      document.querySelectorAll(".table-rect.active").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".bride-rect.active").forEach(el => el.classList.remove("active"));
    }

    function findGuest() {
      const input = document.getElementById("search").value;
      const needle = normalizePl(input);
      const person = guests.find(g => g.wyszukiwalny && normalizePl(g.imie + " " + g.nazwisko) === needle);
      clearHighlights();

      if (!person) {
        alert("Nie znaleziono takiej osoby. Sprawdź pisownię.");
        return;
      }

      // Odtwarzanie dźwięku w zależności od liczby kliknięć
      let audio;
      if (successfulSearchCount === 0) {
        audio = document.getElementById("searchAudio");
      } else {
        audio = document.getElementById("donkeyAudio");
      }
      successfulSearchCount++; // Zwiększamy licznik, by następnym razem uruchomił się Osioł

      if (audio) {
        audio.currentTime = 0; 
        audio.play().catch(err => {
          console.log("Odtwarzanie audio zostało zablokowane przez przeglądarkę:", err);
        });
      }

      document.body.classList.add("show-background");

      if (mainLegend) {
        mainLegend.classList.add("hidden");
      }

      const layoutEl = document.querySelector('.layout');
      if (layoutEl && layoutEl.classList.contains('hidden')) {
        layoutEl.classList.remove('hidden');
        layoutEl.classList.add('revealed');
      }

      const tableId = (person.stolik || "").toString().trim();
      const seatNum = parseInt(person.miejsce, 10);

      const resultBox = document.getElementById("result");
      if (resultBox) {
        resultBox.textContent = `Twoje miejsce jest przy: Stole ${tableId}, miejsce ${seatNum}`;
      }

      if (tableId === "Prezydialny") {
        const seatEl = brideSeats.querySelector(`.seat[data-seat="${seatNum}"]`);
        if (seatEl) seatEl.classList.add("you");
        document.getElementById("brideWrap").scrollIntoView({ behavior: "smooth", block: "center" });
        document.getElementById("brideRect")?.classList.add("active");
        return;
      }

      const block = document.querySelector(`.table-block[data-table="${tableId}"]`);
      if (block) {
        block.querySelector(".table-rect")?.classList.add("active");
        const seatEl = block.querySelector(`.seat[data-seat="${seatNum}"]`);
        if (seatEl) seatEl.classList.add("you");
        (seatEl || block).scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    document.getElementById("btn").addEventListener("click", findGuest);
    document.getElementById("search").addEventListener("keydown", (e) => {
      if (e.key === "Enter") findGuest();
    });

    (function() {
      try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch(e) {}

      function gotoSearch(behavior) {
        const header = document.querySelector('header');
        window.scrollTo({ left: 0, top: 0, behavior: behavior || 'auto' });
        if (header) {
          header.scrollIntoView({ behavior: behavior || 'auto', block: 'start', inline: 'nearest' });
        }
      }

      function boot() {
        let tries = 0;
        function tick() {
          gotoSearch('auto');
          if (++tries < 10) setTimeout(tick, 100);
        }
        tick();
      }

      window.addEventListener('DOMContentLoaded', boot);
      window.addEventListener('load', boot);
      window.addEventListener('pageshow', boot);
      window.addEventListener('orientationchange', () => setTimeout(boot, 120));
      window.addEventListener('resize', () => setTimeout(boot, 120));
    })();
  </script>
